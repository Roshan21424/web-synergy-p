# ?? MySQL ?????????????????????????????????????????????????????????????????????
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# FIX: HikariCP connection pool (was at defaults ? risks exhaustion under load)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?? Redis ?????????????????????????????????????????????????????????????????????
spring.data.redis.url=${REDIS_URL}

# FIX: Lettuce connection pool (was at defaults)
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# ?? JWT ???????????????????????????????????????????????????????????????????????
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationsMS=${JWT_EXPIRATION:86400000}

# ?? Frontend ??????????????????????????????????????????????????????????????????
app.frontend.url=${FRONTEND_URL}

# ?? Actuator (FIX: added ? required for health checks / liveness probes) ??????
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=${PORT:8080}

# Trust proxy headers (needed on Render, Railway, AWS ALB, etc.)
server.forward-headers-strategy=framework

# ?? Multipart / body size limits ??????????????????????????????????????????????
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=2MB

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.personal.synergy=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

